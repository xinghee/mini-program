<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.5">
  <title>淡黄页 · Markdown 记事</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ui-font, 'Georgia', serif);
      background-color: var(--bg-color, #faf6ea);
      color: var(--text-color, #2c2216);
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ── display area ── */
    .display-area {
      max-width: var(--reading-width, 68ch);
      margin: 0 auto;
      padding: 5rem 1.5rem 10rem; /* 增加顶部内边距，避免被右上角设置按钮遮挡 */
      display: flex;
      flex-direction: column;
    }

    .markdown-item {
      padding: 1.6rem 0 1.4rem;
      border-bottom: 1px solid rgba(195, 158, 82, 0.15);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      word-wrap: break-word;
      animation: fadeSlide 0.28s ease-out;
    }
    .markdown-item:first-child { padding-top: 0.4rem; }
    .markdown-item:last-child  { border-bottom: none; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-header {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      height: 0;
      overflow: visible;
      opacity: 0;
      transition: opacity 0.18s;
      position: relative;
      z-index: 1;
    }
    .markdown-item:hover .item-header { opacity: 1; }

    .item-index {
      font-size: 0.68rem;
      color: #b8975a;
      font-family: 'Georgia', serif;
      margin-right: auto;
    }

    .read-btn {
      background: none;
      border: 1px solid rgba(195, 158, 82, 0.35);
      color: #9a7a3a;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      display: flex; align-items: center; gap: 0.2rem;
      transition: all 0.18s;
      font-family: inherit;
      white-space: nowrap;
    }
    .read-btn:hover, .read-btn.reading {
      background: rgba(219, 180, 92, 0.18);
      border-color: #c9a24a;
      color: #6b4f1a;
    }

    .delete-btn {
      background: none; border: none;
      color: #be8f4b; font-size: 0.95rem;
      cursor: pointer;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: 0.18s; opacity: 0.55;
    }
    .delete-btn:hover { opacity: 1; color: #b45f2a; background: rgba(230,175,90,0.2); }

    /* ── markdown body ── */
    .markdown-body {
      font-family: var(--content-font, 'Georgia', 'Noto Serif SC', serif);
      color: inherit;
      font-size: var(--font-size, 1.05rem);
      line-height: var(--line-height, 1.85);
      letter-spacing: 0.01em;
      word-break: break-word;
    }
    .markdown-body h1,.markdown-body h2,.markdown-body h3,
    .markdown-body h4,.markdown-body h5,.markdown-body h6 {
      color: inherit; font-weight: 700;
      margin: 1rem 0 0.35rem; line-height: 1.3;
    }
    .markdown-body h1 { font-size: 1.7em; }
    .markdown-body h2 { font-size: 1.38em; }
    .markdown-body h3 { font-size: 1.15em; }
    .markdown-body p  { margin: 0.45rem 0; }
    .markdown-body ul,.markdown-body ol { padding-left: 1.6rem; margin: 0.4rem 0; }
    .markdown-body li { margin: 0.22rem 0; }
    .markdown-body blockquote {
      border-left: 2.5px solid rgba(195, 158, 82, 0.5);
      padding: 0.1rem 0 0.1rem 1rem;
      margin: 0.7rem 0; opacity: 0.78; font-style: italic;
    }
    .markdown-body code {
      background: rgba(195, 158, 82, 0.13);
      padding: 0.1rem 0.33rem; border-radius: 3px;
      font-family: 'Consolas','SF Mono',monospace; font-size: 0.86em;
    }
    .markdown-body pre {
      background: rgba(195, 158, 82, 0.07);
      padding: 0.9rem 1rem; border-radius: 6px;
      overflow-x: auto; border: 1px solid rgba(195,158,82,0.2);
      margin: 0.7rem 0;
    }
    .markdown-body pre code { background: transparent; padding: 0; font-size: 0.9em; }
    .markdown-body a  { color: inherit; text-decoration: underline; opacity: 0.7; }
    
    /* 强化加粗样式，增加阴影或边框让其更突出 */
    .markdown-body strong { 
      font-weight: 800; 
      color: var(--text-color, #2c2216);
      background: rgba(219, 180, 92, 0.12); /* 淡淡的底色衬托 */
      padding: 0 0.2rem;
      border-radius: 3px;
    }
    .markdown-body em { font-style: italic; }
    .markdown-body hr { border: none; border-top: 1px solid rgba(195,158,82,0.22); margin: 1rem 0; }

    /* ── empty placeholder ── */
    .empty-placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: #b8975a;
      font-style: italic; font-size: 1rem;
      padding: 5rem 1rem; opacity: 0.65;
      user-select: none; gap: 0.5rem;
      font-family: 'Georgia', serif;
    }
    .empty-placeholder span { font-size: 2rem; }

    .hint-text {
      text-align: center;
      max-width: 68ch; margin: 0 auto;
      color: #c0a060; font-size: 0.72rem;
      padding: 0.6rem 1.5rem 1.5rem; opacity: 0.7;
    }

    /* ── 独立定位按钮 ── */
    .settings-fab-container {
      position: fixed;
      top: 2rem; right: 2rem;
      z-index: 100;
    }

    .write-fab-container {
      position: fixed;
      bottom: 2rem; right: 2rem;
      z-index: 100;
    }

    .fab {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f3da9a, #dbb45c);
      border: 1px solid #f0e0a8;
      box-shadow: 0 5px 18px rgba(185,130,25,0.32);
      cursor: pointer;
      font-size: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.22s, box-shadow 0.22s;
      color: #4d3b1a;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(175,115,15,0.38); }
    .fab.open  { transform: rotate(45deg) scale(1.05); }

    /* ── 输入面板（保留在右下角） ── */
    .input-section {
      position: fixed;
      bottom: 5.2rem; right: 2rem;
      z-index: 99;
      width: min(380px, calc(100vw - 2rem));
      display: flex; flex-direction: column; gap: 0.55rem;
      background: rgba(255,251,232,0.97);
      padding: 0.9rem 1rem;
      backdrop-filter: blur(14px);
      border: 1px solid #e5cb8a;
      border-radius: 1.2rem;
      box-shadow: 0 12px 36px rgba(170,120,20,0.16);
      opacity: 0; pointer-events: none;
      transform: translateY(12px) scale(0.97);
      transform-origin: bottom right;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .input-section.visible {
      opacity: 1; pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .textarea-label {
      display: flex; align-items: center;
      justify-content: space-between;
      color: #7a6238; font-size: 0.8rem;
    }
    .textarea-label span:first-child { display: flex; align-items: center; gap: 0.3rem; }
    .markdown-hint {
      color: #b2925a; font-size: 0.7rem;
      background: rgba(245,225,160,0.4);
      padding: 0.1rem 0.55rem; border-radius: 20px;
    }

    .text-input {
      width: 100%; background: #fffef5;
      border: 1px solid #e7cd92; outline: none;
      font-size: 0.9rem; padding: 0.5rem 0.85rem;
      color: #4b3a1e; line-height: 1.55;
      border-radius: 0.75rem; resize: vertical; min-height: 80px;
      font-family: 'Consolas','Cascadia Code','Noto Serif SC',monospace,serif;
      box-shadow: inset 0 2px 6px rgba(190,140,50,0.07);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .text-input::placeholder { color: #ccb385; font-style: italic; font-size: 0.85rem; }
    .text-input:focus {
      background: #fffffb;
      box-shadow: inset 0 2px 10px rgba(195,145,40,0.12), 0 0 0 2px rgba(235,195,100,0.4);
      border-color: #dbb45c;
    }

    .button-row { display: flex; justify-content: flex-end; gap: 0.45rem; align-items: center; }

    .add-button {
      background: linear-gradient(145deg, #f3da9a, #dbb45c);
      border: 1px solid #f3e0aa; color: #4d3b1a;
      font-weight: 600; font-size: 0.85rem;
      padding: 0.42rem 1.2rem; border-radius: 3rem;
      cursor: pointer; display: flex; align-items: center; gap: 0.3rem;
      transition: all 0.2s; box-shadow: 0 3px 8px rgba(185,130,25,0.2);
      font-family: inherit;
    }
    .add-button:hover { background: linear-gradient(145deg,#fae3aa,#e7c26a); transform: scale(1.02); }
    .add-button:active { transform: translateY(1px); }

    .clear-button {
      border: 1px solid #dbbc7c; color: #7a5e32;
      font-size: 0.8rem; padding: 0.35rem 0.9rem;
      border-radius: 2.5rem; cursor: pointer;
      background: rgba(255,250,235,0.7);
      transition: 0.2s; display: flex; align-items: center; gap: 0.2rem;
      font-family: inherit;
    }
    .clear-button:hover { background: #f7efd6; border-color: #c9a24a; }

    /* ── 设置面板（移到右上角） ── */
    .settings-panel {
      position: fixed;
      top: 5.2rem; right: 2rem;
      z-index: 98;
      width: min(320px, calc(100vw - 2rem));
      background: rgba(255,251,232,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid #e5cb8a;
      border-radius: 1.2rem;
      box-shadow: 0 12px 36px rgba(170,120,20,0.16);
      padding: 1rem 1.1rem 1rem;
      opacity: 0; pointer-events: none;
      transform: translateY(-12px) scale(0.97); /* 向上收起动画 */
      transform-origin: top right;
      transition: opacity 0.22s ease, transform 0.22s ease;
      display: flex; flex-direction: column; gap: 0.85rem;
    }
    .settings-panel.visible {
      opacity: 1; pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .settings-title {
      font-size: 0.8rem; font-weight: 600;
      color: #6b4f1a;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(195,158,82,0.22);
      display: flex; align-items: center; gap: 0.3rem;
    }

    .setting-group { display: flex; flex-direction: column; gap: 0.3rem; }

    .setting-label {
      font-size: 0.72rem; color: #8a6a38;
      display: flex; justify-content: space-between; align-items: center;
    }
    .setting-label .val { color: #4a3010; font-weight: 600; min-width: 3rem; text-align: right; }

    /* 字体按钮 */
    .font-options { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .font-opt {
      border: 1px solid rgba(195,158,82,0.38);
      background: rgba(255,250,235,0.7);
      color: #6b4f1a; font-size: 0.7rem;
      padding: 0.2rem 0.65rem; border-radius: 20px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .font-opt:hover { background: rgba(219,180,92,0.18); border-color: #c9a24a; }
    .font-opt.active {
      background: linear-gradient(145deg,#f3da9a,#dbb45c);
      border-color: #dbb45c; color: #3a2a0a; font-weight: 600;
    }

    /* 颜色主题 */
    .theme-options { display: flex; gap: 0.45rem; flex-wrap: wrap; align-items: center; }
    .theme-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      position: relative; flex-shrink: 0;
    }
    .theme-swatch:hover { transform: scale(1.15); }
    .theme-swatch.active { border-color: #c9a24a; box-shadow: 0 0 0 2px rgba(195,158,82,0.35); }
    .theme-swatch .chk {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; opacity: 0;
    }
    .theme-swatch.active .chk { opacity: 1; }

    /* 滑块 */
    .setting-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      background: linear-gradient(to right,
        #dbb45c 0%, #dbb45c var(--pct,50%),
        rgba(195,158,82,0.22) var(--pct,50%), rgba(195,158,82,0.22) 100%);
      outline: none; cursor: pointer;
    }
    .setting-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: linear-gradient(145deg,#f3da9a,#c9a24a);
      border: 1.5px solid #f0e0a8;
      box-shadow: 0 2px 5px rgba(170,120,20,0.28);
      cursor: pointer;
    }
    .setting-slider::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%;
      background: linear-gradient(145deg,#f3da9a,#c9a24a);
      border: 1.5px solid #f0e0a8; cursor: pointer;
    }

    /* 自定义颜色 */
    .color-row { display: flex; gap: 0.6rem; align-items: center; }
    .color-input-wrap { display: flex; align-items: center; gap: 0.28rem; }
    .color-input-wrap label { font-size: 0.7rem; color: #8a6a38; }
    input[type="color"] {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid rgba(195,158,82,0.4);
      cursor: pointer; padding: 1px;
      background: none;
    }

    @media (max-width: 600px) {
      .display-area { padding: 5rem 1rem 9rem; }
      .settings-fab-container { top: 1rem; right: 1rem; }
      .write-fab-container { bottom: 1rem; right: 1rem; }
      .input-section { width: calc(100vw - 2rem); bottom: 4.8rem; right: 1rem; }
      .settings-panel { width: calc(100vw - 2rem); top: 4.8rem; right: 1rem; }
    }
  </style>
</head>
<body>

  <div id="displayArea" class="display-area">
    <div class="empty-placeholder" id="emptyPlaceholder">
      <span>🌾</span>
      <p>淡黄色空白页</p>
      <p style="font-size:0.88rem;margin-top:0.25rem;">用 Markdown 写下第一段文字吧</p>
    </div>
  </div>
  <div class="hint-text">✦ 支持 Markdown · 悬停条目可朗读或删除 ✦</div>

  <div class="input-section" id="inputSection">
    <div class="textarea-label">
      <span>📝 写下文字（支持 Markdown）</span>
      <span class="markdown-hint">**粗** *斜* `代码`</span>
    </div>
    <textarea id="textInput" class="text-input"
      placeholder="例如：# 标题&#10;这是一段**粗体**文字。&#10;- 列表项&#10;> 引用" rows="5"></textarea>
    <div class="button-row">
      <button id="clearInputBtn" class="clear-button">🧹 清空</button>
      <button id="addButton" class="add-button">✨ 添加至页面</button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">⚙️ 显示与朗读设置</div>

    <div class="setting-group">
      <div class="setting-label"><span>正文字体</span></div>
      <div class="font-options" id="fontOptions">
        <button class="font-opt"
          data-font="'Microsoft YaHei', 'PingFang SC', sans-serif"
          style="font-family:'Microsoft YaHei',sans-serif">微软雅黑</button>
        <button class="font-opt active"
          data-font="'Georgia','Noto Serif SC',serif"
          style="font-family:Georgia,serif">衬线</button>
        <button class="font-opt"
          data-font="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
          style="font-family:sans-serif">黑体</button>
        <button class="font-opt"
          data-font="'KaiTi','华文楷体','STKaiti',serif"
          style="font-family:KaiTi,serif">楷体</button>
        <button class="font-opt"
          data-font="'Noto Serif SC','Source Han Serif SC','宋体',serif"
          style="font-family:'宋体',serif">宋体</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">
        <span>字体大小</span>
        <span class="val" id="fontSizeVal">16px</span>
      </div>
      <input type="range" class="setting-slider" id="fontSizeSlider"
        min="13" max="22" step="1" value="16">
    </div>

    <div class="setting-group">
      <div class="setting-label">
        <span>行间距</span>
        <span class="val" id="lineHeightVal">1.85</span>
      </div>
      <input type="range" class="setting-slider" id="lineHeightSlider"
        min="1.3" max="2.4" step="0.05" value="1.85">
    </div>

    <div class="setting-group">
      <div class="setting-label">
        <span>阅读宽度</span>
        <span class="val" id="widthVal">68ch</span>
      </div>
      <input type="range" class="setting-slider" id="widthSlider"
        min="40" max="90" step="1" value="68">
    </div>

    <div class="setting-group">
      <div class="setting-label"><span>颜色主题</span></div>
      <div class="theme-options" id="themeOptions">
        <div class="theme-swatch active"
          data-bg="#faf6ea" data-text="#2c2216" title="暖黄（默认）"
          style="background:#faf6ea;border-color:#dbb45c">
          <span class="chk" style="color:#8a6530">✓</span></div>
        <div class="theme-swatch"
          data-bg="#f5f0e8" data-text="#282118" title="羊皮纸"
          style="background:#f5f0e8"><span class="chk" style="color:#7a6040">✓</span></div>
        <div class="theme-swatch"
          data-bg="#f0f4ef" data-text="#1d2a1d" title="竹青"
          style="background:#f0f4ef"><span class="chk" style="color:#4a604a">✓</span></div>
        <div class="theme-swatch"
          data-bg="#eff2f5" data-text="#1a2030" title="淡蓝"
          style="background:#eff2f5"><span class="chk" style="color:#4a5070">✓</span></div>
        <div class="theme-swatch"
          data-bg="#f4f0f6" data-text="#211d2a" title="淡紫"
          style="background:#f4f0f6"><span class="chk" style="color:#60507a">✓</span></div>
        <div class="theme-swatch"
          data-bg="#1c1a15" data-text="#e6ddc6" title="深夜"
          style="background:#1c1a15"><span class="chk" style="color:rgba(230,220,190,0.6)">✓</span></div>
        <div class="theme-swatch"
          data-bg="#111820" data-text="#c8d8e8" title="深蓝夜"
          style="background:#111820"><span class="chk" style="color:rgba(200,220,235,0.6)">✓</span></div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label"><span>自定义颜色</span></div>
      <div class="color-row">
        <div class="color-input-wrap">
          <label>背景</label>
          <input type="color" id="bgColorPicker" value="#faf6ea">
        </div>
        <div class="color-input-wrap">
          <label>文字</label>
          <input type="color" id="textColorPicker" value="#2c2216">
        </div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">
        <span>朗读速度（晓晓）</span>
        <span class="val" id="speechRateVal">1.0×</span>
      </div>
      <input type="range" class="setting-slider" id="speechRateSlider"
        min="0.5" max="2.0" step="0.05" value="1.0">
    </div>
  </div>

  <div class="settings-fab-container">
    <button class="fab" id="settingsFab" title="显示设置">⚙️</button>
  </div>
  
  <div class="write-fab-container">
    <button class="fab" id="fabBtn" title="写入内容">✏️</button>
  </div>

  <script>
  (function () {
    const root = document.documentElement;

    // ── 配置状态 ──
    const cfg = {
      font:         "'Georgia','Noto Serif SC',serif",
      fontSize:     16,
      lineHeight:   1.85,
      readingWidth: 68,
      bg:           '#faf6ea',
      text:         '#2c2216',
      speechRate:   1.0,
    };

    function applySettings() {
      root.style.setProperty('--content-font',   cfg.font);
      root.style.setProperty('--font-size',      cfg.fontSize + 'px');
      root.style.setProperty('--line-height',    cfg.lineHeight);
      root.style.setProperty('--reading-width',  cfg.readingWidth + 'ch');
      root.style.setProperty('--bg-color',       cfg.bg);
      root.style.setProperty('--text-color',     cfg.text);
      document.body.style.backgroundColor = cfg.bg;
      document.body.style.color = cfg.text;
    }

    // ── 存储 ──
    const STORAGE_KEY_SETTINGS = 'pale_page_settings';
    const STORAGE_KEY_ITEMS    = 'pale_page_items';

    function saveSettings() {
      try {
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(cfg));
      } catch (e) { /* storage full or unavailable */ }
    }

    function saveItems() {
      try {
        localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(markdownItems));
      } catch (e) { /* storage full or unavailable */ }
    }

    function loadSettings() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY_SETTINGS);
        if (saved) {
          const parsed = JSON.parse(saved);
          Object.assign(cfg, parsed);
          // 将存储值同步到 UI 控件
          // 字体
          document.querySelectorAll('.font-opt').forEach(b => {
            b.classList.toggle('active', b.dataset.font === cfg.font);
          });
          // 字号
          fontSizeSlider.value = cfg.fontSize;
          fontSizeVal.textContent = cfg.fontSize + 'px';
          updateFill(fontSizeSlider);
          // 行距
          lineHeightSlider.value = cfg.lineHeight;
          lineHeightVal.textContent = cfg.lineHeight.toString();
          updateFill(lineHeightSlider);
          // 阅读宽度
          widthSlider.value = cfg.readingWidth;
          widthVal.textContent = cfg.readingWidth + 'ch';
          updateFill(widthSlider);
          // 颜色主题 -> 高亮匹配的 swatch
          document.querySelectorAll('.theme-swatch').forEach(s => {
            s.classList.toggle('active', s.dataset.bg === cfg.bg && s.dataset.text === cfg.text);
          });
          document.getElementById('bgColorPicker').value   = cfg.bg;
          document.getElementById('textColorPicker').value = cfg.text;
          // 朗读速度
          speechRateSlider.value = cfg.speechRate;
          const disp = cfg.speechRate % 1 === 0
            ? cfg.speechRate.toFixed(1)
            : cfg.speechRate.toFixed(2).replace(/0+$/, '');
          speechRateVal.textContent = disp + '×';
          updateFill(speechRateSlider);
        }
      } catch (e) { /* ignore corrupt data */ }
      applySettings();
    }

    function loadItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY_ITEMS);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            markdownItems = parsed;
          }
        }
      } catch (e) { /* ignore corrupt data */ }
      render();
    }

    // ── 滑块填充辅助 ──
    function updateFill(slider) {
      const pct = ((slider.value - slider.min) / (slider.max - slider.min) * 100).toFixed(1) + '%';
      slider.style.setProperty('--pct', pct);
    }

    // ── 字体 ──
    document.querySelectorAll('.font-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.font-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cfg.font = btn.dataset.font;
        applySettings();
        saveSettings();
      });
    });

    // ── 字号 ──
    const fontSizeSlider = document.getElementById('fontSizeSlider');
    const fontSizeVal    = document.getElementById('fontSizeVal');
    fontSizeSlider.addEventListener('input', () => {
      cfg.fontSize = +fontSizeSlider.value;
      fontSizeVal.textContent = cfg.fontSize + 'px';
      updateFill(fontSizeSlider);
      applySettings();
      saveSettings();
    });
    updateFill(fontSizeSlider);

    // ── 行距 ──
    const lineHeightSlider = document.getElementById('lineHeightSlider');
    const lineHeightVal    = document.getElementById('lineHeightVal');
    lineHeightSlider.addEventListener('input', () => {
      cfg.lineHeight = parseFloat(lineHeightSlider.value).toFixed(2);
      lineHeightVal.textContent = cfg.lineHeight;
      updateFill(lineHeightSlider);
      applySettings();
      saveSettings();
    });
    updateFill(lineHeightSlider);

    // ── 阅读宽度 ──
    const widthSlider = document.getElementById('widthSlider');
    const widthVal    = document.getElementById('widthVal');
    widthSlider.addEventListener('input', () => {
      cfg.readingWidth = +widthSlider.value;
      widthVal.textContent = cfg.readingWidth + 'ch';
      updateFill(widthSlider);
      applySettings();
      saveSettings();
    });
    updateFill(widthSlider);

    // ── 颜色主题 ──
    document.querySelectorAll('.theme-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        cfg.bg   = sw.dataset.bg;
        cfg.text = sw.dataset.text;
        document.getElementById('bgColorPicker').value   = cfg.bg;
        document.getElementById('textColorPicker').value = cfg.text;
        applySettings();
        saveSettings();
      });
    });

    // ── 自定义颜色 ──
    document.getElementById('bgColorPicker').addEventListener('input', e => {
      cfg.bg = e.target.value;
      document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
      applySettings();
      saveSettings();
    });
    document.getElementById('textColorPicker').addEventListener('input', e => {
      cfg.text = e.target.value;
      document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
      applySettings();
      saveSettings();
    });

    // ── 朗读速度 ──
    const speechRateSlider = document.getElementById('speechRateSlider');
    const speechRateVal    = document.getElementById('speechRateVal');
    speechRateSlider.addEventListener('input', () => {
      cfg.speechRate = parseFloat(speechRateSlider.value);
      const disp = cfg.speechRate % 1 === 0
        ? cfg.speechRate.toFixed(1)
        : cfg.speechRate.toFixed(2).replace(/0+$/, '');
      speechRateVal.textContent = disp + '×';
      updateFill(speechRateSlider);
      saveSettings();
    });
    updateFill(speechRateSlider);

    // 加载存储的设置和条目（必须放在所有 DOM 引用之后）
    loadSettings();

    // ── FAB 面板切换 ──
    const fabBtn       = document.getElementById('fabBtn');
    const settingsFab  = document.getElementById('settingsFab');
    const inputSection = document.getElementById('inputSection');
    const settingsPanel = document.getElementById('settingsPanel');
    const textInput    = document.getElementById('textInput');

    function closeAll() {
      inputSection.classList.remove('visible');
      settingsPanel.classList.remove('visible');
      fabBtn.classList.remove('open');
      settingsFab.classList.remove('open');
    }

    fabBtn.addEventListener('click', () => {
      const willOpen = !inputSection.classList.contains('visible');
      closeAll();
      if (willOpen) {
        inputSection.classList.add('visible');
        fabBtn.classList.add('open');
        setTimeout(() => textInput.focus(), 50);
      }
    });

    settingsFab.addEventListener('click', () => {
      const willOpen = !settingsPanel.classList.contains('visible');
      closeAll();
      if (willOpen) {
        settingsPanel.classList.add('visible');
        settingsFab.classList.add('open');
      }
    });

    // ── Markdown 解析 ──
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
    }
    function parseMarkdown(md) {
      if (!md) return '';
      try { return (typeof marked !== 'undefined') ? marked.parse(md) : escHtml(md).replace(/\n/g,'<br>'); }
      catch (e) { return escHtml(md).replace(/\n/g,'<br>'); }
    }
    function escHtml(t) {
      return t.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    // ── TTS ──
    let currentReadBtn = null;

    function getXiaoxiaoVoice() {
      const vv = speechSynthesis.getVoices();
      return (
        vv.find(v => /xiaoxiao/i.test(v.name) && /zh/i.test(v.lang)) ||
        vv.find(v => /xiaoxiao/i.test(v.name)) ||
        vv.find(v => /zh[-_]CN/i.test(v.lang) && /microsoft/i.test(v.name)) ||
        vv.find(v => /zh[-_]CN/i.test(v.lang)) ||
        null
      );
    }

    function stripMd(md) {
      return md
        .replace(/#{1,6}\s*/g, '')
        .replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1')
        .replace(/`{1,3}[^`]*`{1,3}/g,'')
        .replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1')
        .replace(/^[-*+]\s+/gm,'').replace(/^\d+\.\s+/gm,'')
        .replace(/^>\s*/gm,'').replace(/[-]{2,}/g,'').trim();
    }

    function toggleRead(btn, rawText) {
      if (currentReadBtn && currentReadBtn !== btn) {
        speechSynthesis.cancel();
        currentReadBtn.classList.remove('reading');
        currentReadBtn.innerHTML = '🔊 朗读';
        currentReadBtn = null;
      }
      if (btn.classList.contains('reading')) {
        speechSynthesis.cancel();
        btn.classList.remove('reading');
        btn.innerHTML = '🔊 朗读';
        currentReadBtn = null;
        return;
      }
      const text = stripMd(rawText);
      if (!text) return;

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate  = cfg.speechRate;
      utter.pitch = 1;

      const speak = () => {
        const voice = getXiaoxiaoVoice();
        if (voice) utter.voice = voice;
        speechSynthesis.speak(utter);
      };
      speechSynthesis.getVoices().length === 0
        ? (speechSynthesis.onvoiceschanged = speak)
        : speak();

      btn.classList.add('reading');
      btn.innerHTML = '⏹ 停止';
      currentReadBtn = btn;

      utter.onend = utter.onerror = () => {
        btn.classList.remove('reading');
        btn.innerHTML = '🔊 朗读';
        currentReadBtn = null;
      };
    }

    // ── 渲染 ──
    const displayArea     = document.getElementById('displayArea');
    const emptyPlaceholder = document.getElementById('emptyPlaceholder');
    let markdownItems = [];

    function render() {
      displayArea.querySelectorAll('.markdown-item').forEach(el => el.remove());
      emptyPlaceholder.style.display = markdownItems.length ? 'none' : 'flex';

      markdownItems.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'markdown-item';

        // header
        const header = document.createElement('div');
        header.className = 'item-header';

        const idx = document.createElement('span');
        idx.className = 'item-index';
        idx.textContent = `§ ${i + 1}`;

        const readBtn = document.createElement('button');
        readBtn.className = 'read-btn';
        readBtn.innerHTML = '🔊 朗读';
        readBtn.title = '晓晓语音朗读（在设置中调整速度）';
        readBtn.addEventListener('click', e => { e.stopPropagation(); toggleRead(readBtn, item.rawText); });

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✕';
        delBtn.title = '移除';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          speechSynthesis.cancel();
          markdownItems.splice(i, 1);
          render();
          saveItems();
        });

        header.append(idx, readBtn, delBtn);

        const body = document.createElement('div');
        body.className = 'markdown-body';
        body.innerHTML = parseMarkdown(item.rawText);

        card.append(header, body);
        displayArea.appendChild(card);
      });
    }

    function addItem(rawText) {
      const t = rawText.trim();
      if (!t) {
        textInput.style.boxShadow = '0 0 0 2px rgba(200,80,60,0.4)';
        setTimeout(() => { textInput.style.boxShadow = ''; }, 700);
        textInput.focus(); return;
      }
      markdownItems.push({ rawText: t });
      render();
      saveItems();
      closeAll();
      textInput.value = '';
    }

    document.getElementById('addButton').addEventListener('click', () => addItem(textInput.value));
    document.getElementById('clearInputBtn').addEventListener('click', () => { textInput.value = ''; textInput.focus(); });
    textInput.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addItem(textInput.value); }
    });

    // 加载存储的条目（会调用 render）
    loadItems();
    console.log('✨ 淡黄页已启动。Ctrl+Enter 快速添加。');
  })();
  </script>
</body>
</html>
